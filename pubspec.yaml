name: learnia
description: "App educacional para niños - Learnia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Speech Recognition
  speech_to_text: ^7.3.0
  fuzzy: ^0.5.1

  # Storage
  shared_preferences: ^2.5.3

  # Audio
  audioplayers: ^6.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/sounds/